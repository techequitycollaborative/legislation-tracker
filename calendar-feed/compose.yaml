# calendar-feed/compose.yaml
#
# Run from the monorepo root:
#   docker compose -f calendar-feed/compose.yaml up --build

services:
  calendar-feed:
    build:
      context: ..                               # monorepo root — required for COPY db/
      dockerfile: calendar-feed/Dockerfile
    ports:
      - "5001:5000"
    volumes:
      - ../db/credentials.ini:/app/db/credentials.ini:ro   # never baked into image
      - ../calendar-feed:/app          # overwrites /app for local continous builds
      - ../db:/app/db                  # keeps db/ in sync too
    # now override prod command in compose.yaml
    command: gunicorn "app:create_app()" --bind 0.0.0.0:5000 --workers 2 --worker-class gevent --timeout 30 --access-logfile - --error-logfile -    
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3